<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project Details Format</title>
    <style>
        body { font-family: 'Arial', sans-serif; padding: 20px; }
        .header-container { text-align: center; margin-bottom: 20px; position: relative; }
        .logo { position: absolute; left: 0; top: 0; height: 80px; } /* Adjust height as needed */
        
        .university-name { font-size: 24px; font-weight: bold; margin: 0; }
        .school-name { font-size: 18px; font-weight: bold; margin: 5px 0; }
        .academic-year { font-size: 16px; margin-bottom: 20px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid black; padding: 8px; text-align: center; font-size: 13px; }
        
        /* Column widths to match the document */
        .col-group { width: 5%; }
        .col-sr { width: 4%; }
        .col-name { width: 15%; }
        .col-prn { width: 10%; }
        .col-guide { width: 12%; }
        .col-title { width: 15%; }
        .col-domain { width: 10%; }
        .col-industry { width: 10%; }
        .col-contact { width: 19%; }

        th { background-color: #f2f2f2; font-weight: bold; }
        .group-row { height: 100px; } /* Provides space for multiple student entries */
    </style>
</head>
<body>

    <div class="header-container">
        <img src="sandip_university_logo.png" alt="Sandip University Logo" class="logo">
        
        <div class="university-name">Sandip University</div>
        <div class="school-name">School Of Computer Science and Engineering</div>
        <div class="academic-year">Project Details Academic Year 2026-27</div>
    </div>

    <table>
        <thead>
            <tr>
                <th class="col-group">Group No.</th>
                <th class="col-sr">Sr.No.</th>
                <th class="col-name">Name Of Student</th>
                <th class="col-prn">PRN</th>
                <th class="col-guide">Project Guide Name</th>
                <th class="col-title">Project Title</th>
                <th class="col-domain">Domain</th>
                <th class="col-industry">Industry Name</th>
                <th class="col-contact">Industry contact person name, Designation and contact number</th>
            </tr>
        </thead>
        <tbody>
            <tr class="group-row">
                <td>1</td>
                <td>1<br><br>2<br><br>3<br><br>4</td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
            </tr>
            <tr class="group-row">
                <td>2</td>
                <td>1<br><br>2<br><br>3<br><br>4</td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
            </tr>
        </tbody>
    </table>

</body>
</html>
